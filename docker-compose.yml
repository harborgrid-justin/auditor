version: '3.8'

services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=http://localhost:3000
      - DATABASE_PROVIDER=sqlite
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
